name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run lint || true
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # Deployment steps require secrets from the host provider and are left as a template.
